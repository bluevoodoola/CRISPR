name: Deploy site to GitHub Pages

# Builds and deploys the site to GitHub Pages from the `publish` (production)
# branch. The anomalies.json feed is generated here at deploy time, so it is
# never committed to the repo (it's a build artifact).
#
# The gate is promotion to `publish`: commits to `main` are NOT published.
# To release, advance `publish` to `main` (fast-forward/merge) and push it —
# that push triggers this deploy. `workflow_dispatch` re-deploys on demand.
#
# Requires the repo's Pages source to be set to "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
on:
  push:
    branches: [publish]
  workflow_dispatch:

# GITHUB_TOKEN permissions for deploying to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publish
        uses: actions/checkout@v6
        with:
          ref: publish

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate anomalies.json
        run: node swagtimeline/build-anomalies-feed.js

      - name: Stage site (exclude VCS/CI and repo docs)
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='_site' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            --exclude='docs' \
            ./ _site/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
